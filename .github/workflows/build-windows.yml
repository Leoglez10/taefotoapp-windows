name: "Build Windows Installer"

on:
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'

jobs:
  build-windows:
    runs-on: windows-latest

    permissions:
      contents: write # Necesario para crear la Release y subir el archivo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: auto # Generará un pre-release o release basado en el package.json
          releaseName: 'Prestamo de Equipos - Windows'
          releaseBody: |
            Instalador de la aplicación para Windows. Descarga el archivo de abajo para instalar.
            
            **Si Windows bloquea la instalación:**
            1. Click derecho en el archivo → Propiedades
            2. Abajo a la derecha, marca "Desbloquear"
            3. Aplica los cambios
            4. Ejecuta el instalador
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          artifactPath: src-tauri/target/release/bundle/windows/*.msi
          artifactName: PrestamoDeEquipos-Installer.msi
          artifactContentType: application/x-msdownload
          artifactUpload: true
          artifactUploadPath: 'releases/${{ github.ref_name }}/PrestamoDeEquipos-Installer.msi'
